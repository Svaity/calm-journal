<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>calm — journal</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#f4f1ec" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="calm" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
  :root {
    --bg: #f4f1ec;
    --bg-soft: #ebe6df;
    --ink: #3a3631;
    --ink-soft: #8a8278;
    --accent: #6b8e7f;
    --accent-soft: #c5d4cb;
    --toolbar-bg: rgba(255, 255, 255, 0.78);
    --toolbar-border: rgba(0,0,0,0.04);
    --divider: rgba(0,0,0,0.08);
    --hairline: rgba(0,0,0,0.06);
    --panel-bg: #ffffff;
    --overlay-bg: rgba(244, 241, 236, 0.85);
  }
  body.dark {
    --bg: #1c1a17;
    --bg-soft: #2a2724;
    --ink: #e8e3da;
    --ink-soft: #8e857a;
    --accent: #9ec1b1;
    --accent-soft: #3d4d44;
    --toolbar-bg: rgba(40, 37, 33, 0.85);
    --toolbar-border: rgba(255,255,255,0.06);
    --divider: rgba(255,255,255,0.10);
    --hairline: rgba(255,255,255,0.07);
    --panel-bg: #2a2724;
    --overlay-bg: rgba(28, 26, 23, 0.85);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s ease, color 0.5s ease;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 24px 120px;
    min-height: 100%;
  }
  .editor {
    width: 100%;
    max-width: 640px;
    flex: 1;
  }
  .date-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 24px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--hairline);
  }
  .date {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .date .weekday { color: var(--ink-soft); font-weight: 400; margin-right: 8px; font-style: italic; }
  .badge {
    font-size: 12px;
    color: var(--ink-soft);
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-soft);
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .badge:hover { background: var(--accent-soft); color: var(--accent); }
  .badge.hidden { display: none; }
  .date-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .date-timer {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
    padding: 4px 14px;
    min-width: 0;
    border-radius: 8px;
    background: var(--bg-soft);
  }
  .date-timer.running { background: var(--accent-soft); }
  textarea.body {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    resize: none;
    font-size: 19px;
    line-height: 1.75;
    min-height: 60vh;
    padding: 20px 0 0;
  }
  textarea.body::placeholder {
    color: var(--ink-soft);
    font-style: italic;
    opacity: 0.55;
  }
  .toolbar-stack {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 5;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
    border: 1px solid var(--toolbar-border);
  }
  button {
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s ease, color 0.2s ease;
    white-space: nowrap;
  }
  button:hover { background: var(--bg-soft); }
  button.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .timer {
    font-variant-numeric: tabular-nums;
    font-size: 16px;
    color: var(--ink);
    padding: 0 10px;
    min-width: 64px;
    text-align: center;
    cursor: pointer;
    transition: color 0.4s ease;
  }
  .timer.running { color: var(--accent); }
  .divider {
    width: 1px;
    height: 20px;
    background: var(--divider);
    margin: 0 4px;
  }
  .theme-toggle {
    width: 18px;
    height: 18px;
    padding: 0;
    margin: 0 6px;
    border-radius: 50%;
    background: var(--ink);
    position: relative;
    overflow: hidden;
    border: 1px solid var(--ink-soft);
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.4s ease;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--bg);
    clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
    transition: background 0.4s ease;
  }
  .theme-toggle:hover { background: var(--ink); transform: rotate(20deg); }
  .status {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .status.show { opacity: 1; }

  /* entries overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 24px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .entries-panel {
    width: 100%;
    max-width: 520px;
    background: var(--panel-bg);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06);
    padding: 24px 8px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .entries-header {
    padding: 0 16px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 8px;
  }
  .entries-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }
  .entries-header .close {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
  }
  .entries-header .close:hover { background: var(--bg-soft); }
  .entry-item {
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .entry-item:hover { background: var(--bg-soft); }
  .entry-item.current { background: var(--accent-soft); }
  .entry-date {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .entry-preview {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
  }
  .entry-delete {
    float: right;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 12px;
    opacity: 0;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .entry-item:hover .entry-delete { opacity: 1; }
  .entry-delete:hover { background: var(--bg-soft); color: var(--ink); }

  /* breathing overlay when timer ends */
  .pulse {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center, var(--accent-soft) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .pulse.on { opacity: 0.5; }

  /* mobile + iOS standalone */
  @media (max-width: 540px) {
    body {
      padding: 32px 18px calc(110px + env(safe-area-inset-bottom));
    }
    .date { font-size: 26px; }
    .date-timer { font-size: 22px; padding: 3px 12px; }
    .date-row { padding-bottom: 18px; }
    textarea.body { font-size: 18px; line-height: 1.7; min-height: 55vh; }
    .toolbar-stack {
      bottom: calc(16px + env(safe-area-inset-bottom));
      gap: 6px;
      width: calc(100vw - 24px);
    }
    .toolbar {
      max-width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }
    button { font-size: 13px; padding: 8px 11px; }
    .timer { font-size: 14px; min-width: 56px; padding: 0 8px; }
  }
  /* hide URL bar feel in standalone */
  @media (display-mode: standalone) {
    body { padding-top: max(48px, env(safe-area-inset-top)); }
  }
</style>
</head>
<body>
  <div class="status" id="status"></div>
  <div class="pulse" id="pulse"></div>

  <div class="editor">
    <div class="date-row">
      <div class="date" id="date"></div>
      <div class="date-right">
        <button class="badge hidden" id="back-today">back to today</button>
        <span class="timer date-timer" id="timer-date" title="click to reset">5:00</span>
      </div>
    </div>
    <textarea class="body" id="body" placeholder="begin..." spellcheck="false"></textarea>
  </div>

  <div class="toolbar-stack">
    <div class="toolbar">
      <button id="btn-forest" data-sound="forest" data-category="nature">forest</button>
      <button id="btn-ocean" data-sound="ocean" data-category="nature">ocean</button>
      <div class="divider"></div>
      <button id="btn-flute" data-sound="flute" data-category="instrument">flute</button>
      <button id="btn-sitar" data-sound="sitar" data-category="instrument">sitar</button>
    </div>
    <div class="toolbar">
      <span class="timer" id="timer" title="click to reset">5:00</span>
      <button id="btn-timer">start</button>
      <div class="divider"></div>
      <button id="btn-entries">entries</button>
      <button class="theme-toggle" id="btn-theme" title="toggle theme" aria-label="toggle theme"></button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="entries-panel">
      <div class="entries-header">
        <h2>journal entries</h2>
        <button class="close" id="close-overlay">close</button>
      </div>
      <div id="entries-list"></div>
    </div>
  </div>

<script>
// ===== journal storage =====
const STORAGE_KEY = 'calm-journal-entries';
const bodyEl = document.getElementById('body');
const dateEl = document.getElementById('date');
const statusEl = document.getElementById('status');
const backTodayBtn = document.getElementById('back-today');

function flash(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add('show');
  clearTimeout(flash._t);
  flash._t = setTimeout(() => statusEl.classList.remove('show'), 1500);
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateLong(key) {
  const [y, m, d] = key.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `<span class="weekday">${weekdays[date.getDay()]}</span>${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}

function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch (e) { return {}; }
}

function saveAll(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

let currentKey = todayKey();

function loadEntry(key) {
  currentKey = key;
  const entries = loadAll();
  bodyEl.value = entries[key] || '';
  dateEl.innerHTML = formatDateLong(key);
  if (key === todayKey()) backTodayBtn.classList.add('hidden');
  else backTodayBtn.classList.remove('hidden');
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 600);
}

function persist() {
  const entries = loadAll();
  const text = bodyEl.value;
  if (text.trim()) entries[currentKey] = text;
  else delete entries[currentKey];
  saveAll(entries);
  flash('saved');
}

bodyEl.addEventListener('input', scheduleSave);
bodyEl.addEventListener('blur', persist);
window.addEventListener('beforeunload', persist);
// iOS Safari/PWA fires these more reliably than beforeunload
window.addEventListener('pagehide', persist);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) persist();
});

// ask iOS for persistent storage so entries aren't auto-evicted
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().catch(() => {});
}

backTodayBtn.addEventListener('click', () => loadEntry(todayKey()));

// initial load
loadEntry(todayKey());

// ===== entries overlay =====
const overlay = document.getElementById('overlay');
const entriesList = document.getElementById('entries-list');

function renderEntries() {
  const entries = loadAll();
  // ensure today shows even if empty
  if (!(todayKey() in entries)) entries[todayKey()] = '';

  const keys = Object.keys(entries).sort().reverse();
  if (keys.length === 0) {
    entriesList.innerHTML = '<div class="entry-empty">no entries yet</div>';
    return;
  }
  entriesList.innerHTML = keys.map(k => {
    const text = entries[k] || '';
    const preview = text.replace(/\n/g, ' ').slice(0, 80) || (k === todayKey() ? 'today — empty' : 'empty');
    const cur = k === currentKey ? ' current' : '';
    return `
      <div class="entry-item${cur}" data-key="${k}">
        <button class="entry-delete" data-key="${k}" title="delete">×</button>
        <div class="entry-date">${formatDateLong(k)}</div>
        <div class="entry-preview">${escapeHtml(preview)}</div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('btn-entries').addEventListener('click', () => {
  persist();
  renderEntries();
  overlay.classList.add('show');
});
document.getElementById('close-overlay').addEventListener('click', () => overlay.classList.remove('show'));
overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });

entriesList.addEventListener('click', (e) => {
  const del = e.target.closest('.entry-delete');
  if (del) {
    e.stopPropagation();
    const key = del.dataset.key;
    if (confirm('delete this entry?')) {
      const all = loadAll();
      delete all[key];
      saveAll(all);
      if (key === currentKey) loadEntry(todayKey());
      renderEntries();
    }
    return;
  }
  const item = e.target.closest('.entry-item');
  if (item) {
    persist();
    loadEntry(item.dataset.key);
    overlay.classList.remove('show');
  }
});

// ===== ambient audio (procedural, multi-track) =====
let audioCtx = null;
const activeSounds = {};

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  unlockMediaBusForIOS();
  return audioCtx;
}

// iOS silent-switch fix: play a silent HTML5 audio element so iOS routes
// Web Audio through the media bus (ignoring the hardware mute switch).
let _silentAudio = null;
function unlockMediaBusForIOS() {
  if (_silentAudio) return;
  const a = document.createElement('audio');
  a.setAttribute('playsinline', '');
  a.setAttribute('webkit-playsinline', '');
  a.loop = true;
  a.preload = 'auto';
  // generate a 0.1s silent WAV at runtime
  const sampleRate = 8000;
  const numSamples = Math.floor(sampleRate * 0.1);
  const buf = new ArrayBuffer(44 + numSamples);
  const dv = new DataView(buf);
  const writeStr = (o, s) => { for (let i=0;i<s.length;i++) dv.setUint8(o+i, s.charCodeAt(i)); };
  writeStr(0,'RIFF'); dv.setUint32(4, 36+numSamples, true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,sampleRate,true); dv.setUint32(28,sampleRate,true);
  dv.setUint16(32,1,true); dv.setUint16(34,8,true);
  writeStr(36,'data'); dv.setUint32(40, numSamples, true);
  for (let i=0;i<numSamples;i++) dv.setUint8(44+i, 128);
  a.src = URL.createObjectURL(new Blob([buf], {type:'audio/wav'}));
  a.play().catch(()=>{});
  _silentAudio = a;
}

// resume audio context when app returns to foreground
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
});

function makeNoiseBuffer(ctx, type = 'white', seconds = 4) {
  const len = ctx.sampleRate * seconds;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + w * 0.0555179;
      b1 = 0.99332 * b1 + w * 0.0750759;
      b2 = 0.96900 * b2 + w * 0.1538520;
      b3 = 0.86650 * b3 + w * 0.3104856;
      b4 = 0.55000 * b4 + w * 0.5329522;
      b5 = -0.7616 * b5 - w * 0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  }
  return buf;
}

function makeReverb(ctx, seconds = 2.5, decay = 3.5) {
  const conv = ctx.createConvolver();
  const len = ctx.sampleRate * seconds;
  const ir = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  conv.buffer = ir;
  return conv;
}

function stopOne(name) {
  const s = activeSounds[name];
  if (!s) return;
  s.alive = false;
  const ctx = audioCtx;
  if (s.master && ctx) {
    const t = ctx.currentTime;
    s.master.gain.cancelScheduledValues(t);
    s.master.gain.setValueAtTime(s.master.gain.value, t);
    s.master.gain.linearRampToValueAtTime(0.0001, t + 0.5);
  }
  setTimeout(() => {
    s.nodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
  }, 600);
  delete activeSounds[name];
  const btn = document.querySelector(`button[data-sound="${name}"]`);
  if (btn) btn.classList.remove('active');
}

// ----- forest -----
function startForest() {
  const ctx = ensureCtx();
  const sound = { nodes: [], alive: true };
  const master = ctx.createGain();
  master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 2);
  master.connect(ctx.destination);
  sound.master = master;

  const src = ctx.createBufferSource();
  src.buffer = makeNoiseBuffer(ctx, 'pink', 5);
  src.loop = true;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 1200;

  const lfo = ctx.createOscillator();
  lfo.frequency.value = 0.08;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 400;
  lfo.connect(lfoGain); lfoGain.connect(lp.frequency);
  lfo.start();

  src.connect(lp); lp.connect(master);
  src.start();
  sound.nodes.push(src, lp, lfo, lfoGain, master);

  const chirp = () => {
    if (!sound.alive) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.frequency.setValueAtTime(1800 + Math.random() * 800, t);
    osc.frequency.exponentialRampToValueAtTime(2400 + Math.random() * 600, t + 0.12);
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(0.04, t + 0.02);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.22);
    setTimeout(chirp, 4000 + Math.random() * 9000);
  };
  setTimeout(chirp, 3000 + Math.random() * 4000);

  return sound;
}

// ----- ocean -----
function startOcean() {
  const ctx = ensureCtx();
  const sound = { nodes: [], alive: true };
  const master = ctx.createGain();
  master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 2);
  master.connect(ctx.destination);
  sound.master = master;

  const src = ctx.createBufferSource();
  src.buffer = makeNoiseBuffer(ctx, 'pink', 6);
  src.loop = true;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 800;

  // slow LFO swelling the gain — wave breaths
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 0.1;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.18;
  lfo.connect(lfoGain); lfoGain.connect(master.gain);
  lfo.start();

  // second slower LFO modulates the lowpass for shifting wave brightness
  const lfo2 = ctx.createOscillator();
  lfo2.frequency.value = 0.06;
  const lfo2Gain = ctx.createGain();
  lfo2Gain.gain.value = 250;
  lfo2.connect(lfo2Gain); lfo2Gain.connect(lp.frequency);
  lfo2.start();

  src.connect(lp); lp.connect(master);
  src.start();
  sound.nodes.push(src, lp, lfo, lfoGain, lfo2, lfo2Gain, master);

  return sound;
}

const midiToFreq = m => 440 * Math.pow(2, (m - 69) / 12);

// ----- flute -----
// Plays melodic phrases, not random notes. Phrases use semitone offsets in a
// soothing scale (raga Yaman-ish: C D E F# G A B). Each note: [offset, beats].
const FLUTE_ROOT = 60; // middle C
const FLUTE_BEAT = 0.55; // seconds per beat
const FLUTE_PHRASES = [
  [[0,2],[2,2],[4,3],[2,1],[0,4]],
  [[7,1],[9,1],[11,2],[9,1],[7,3],[4,3]],
  [[4,1],[2,1],[4,1],[7,2],[9,2],[7,1],[4,3]],
  [[12,2],[11,1],[9,1],[7,2],[4,2],[2,3]],
  [[0,1],[4,1],[7,1],[12,3],[9,1],[7,1],[4,4]],
  [[7,1],[9,2],[7,1],[4,2],[2,1],[0,4]],
];

function playFluteNote(ctx, master, freq, when, duration, velocity) {
  const t = when;
  const noteGain = ctx.createGain();
  const attack = 0.12;
  const release = Math.min(0.4, duration * 0.4);
  noteGain.gain.setValueAtTime(0, t);
  noteGain.gain.linearRampToValueAtTime(velocity, t + attack);
  noteGain.gain.linearRampToValueAtTime(velocity * 0.9, t + duration - release);
  noteGain.gain.linearRampToValueAtTime(0, t + duration);
  noteGain.connect(master);

  // fundamental (sine, gentle)
  const o1 = ctx.createOscillator();
  o1.type = 'sine';
  o1.frequency.value = freq;
  // octave shimmer
  const o2 = ctx.createOscillator();
  o2.type = 'sine';
  o2.frequency.value = freq * 2;
  const g2 = ctx.createGain(); g2.gain.value = 0.18;
  // a touch of 3rd harmonic for breathiness
  const o3 = ctx.createOscillator();
  o3.type = 'triangle';
  o3.frequency.value = freq * 3;
  const g3 = ctx.createGain(); g3.gain.value = 0.04;

  // vibrato — gentle, comes in after the attack
  const vib = ctx.createOscillator();
  vib.frequency.value = 5;
  const vibAmt = ctx.createGain();
  vibAmt.gain.setValueAtTime(0, t);
  vibAmt.gain.linearRampToValueAtTime(freq * 0.006, t + attack + 0.2);
  vib.connect(vibAmt);
  vibAmt.connect(o1.frequency);

  // breath noise
  const breath = ctx.createBufferSource();
  breath.buffer = makeNoiseBuffer(ctx, 'white', duration + 0.5);
  const bf = ctx.createBiquadFilter();
  bf.type = 'bandpass';
  bf.frequency.value = freq * 2;
  bf.Q.value = 0.7;
  const bg = ctx.createGain(); bg.gain.value = 0.025;

  o1.connect(noteGain);
  o2.connect(g2); g2.connect(noteGain);
  o3.connect(g3); g3.connect(noteGain);
  breath.connect(bf); bf.connect(bg); bg.connect(noteGain);

  const stopT = t + duration + 0.1;
  o1.start(t); o1.stop(stopT);
  o2.start(t); o2.stop(stopT);
  o3.start(t); o3.stop(stopT);
  vib.start(t); vib.stop(stopT);
  breath.start(t); breath.stop(stopT);
}

function startFlute() {
  const ctx = ensureCtx();
  const sound = { nodes: [], alive: true };
  const master = ctx.createGain();
  master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 1.2);

  const reverb = makeReverb(ctx, 3, 3);
  const wet = ctx.createGain(); wet.gain.value = 0.3;
  const dry = ctx.createGain(); dry.gain.value = 0.8;
  master.connect(dry); dry.connect(ctx.destination);
  master.connect(reverb); reverb.connect(wet); wet.connect(ctx.destination);
  sound.master = master;
  sound.nodes.push(master, reverb, wet, dry);

  const playPhrase = () => {
    if (!sound.alive) return;
    const phrase = FLUTE_PHRASES[Math.floor(Math.random() * FLUTE_PHRASES.length)];
    let t = ctx.currentTime + 0.05;
    phrase.forEach(([offset, beats]) => {
      const freq = midiToFreq(FLUTE_ROOT + offset);
      const dur = beats * FLUTE_BEAT;
      playFluteNote(ctx, master, freq, t, dur * 0.92, 0.32 + Math.random() * 0.06);
      t += dur;
    });
    const phraseLen = (t - ctx.currentTime) * 1000;
    const pause = 1200 + Math.random() * 1800;
    setTimeout(playPhrase, phraseLen + pause);
  };
  setTimeout(playPhrase, 600);

  return sound;
}

// ----- sitar -----
// Drone (Sa + Pa) + plucked melodic notes from raga-like scale.
const SITAR_ROOT = 50; // D3 — comfortable sitar register
// raga Yaman: Sa Re Ga Ma# Pa Dha Ni Sa = 0 2 4 6 7 9 11 12
const SITAR_PHRASES = [
  [[0,1],[2,1],[4,2],[2,1],[0,3]],
  [[7,1],[9,1],[11,1],[12,2],[11,1],[9,2]],
  [[4,1],[6,1],[7,2],[6,1],[4,1],[2,3]],
  [[12,1],[11,1],[9,2],[7,1],[6,1],[4,2],[2,3]],
  [[0,1],[2,1],[4,1],[7,2],[4,1],[2,1],[0,3]],
  [[9,1],[7,1],[9,1],[11,2],[12,3]],
];
const SITAR_BEAT = 0.5;

function playSitarNote(ctx, master, freq, when, velocity) {
  const t = when;
  const dur = 3.2;
  const noteGain = ctx.createGain();
  noteGain.gain.setValueAtTime(0, t);
  noteGain.gain.linearRampToValueAtTime(velocity, t + 0.005); // sharp pluck
  noteGain.gain.exponentialRampToValueAtTime(velocity * 0.45, t + 0.25);
  noteGain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  noteGain.connect(master);

  // tiny pitch glide upward into the note (sitar meend feel)
  const harmonics = [
    { mult: 1,  amp: 1.0,  type: 'triangle', detune: 0 },
    { mult: 2,  amp: 0.55, type: 'triangle', detune: 4 },
    { mult: 3,  amp: 0.32, type: 'sine',     detune: -3 },
    { mult: 4,  amp: 0.22, type: 'sine',     detune: 5 },
    { mult: 5,  amp: 0.16, type: 'sine',     detune: -4 },
    { mult: 6,  amp: 0.10, type: 'sine',     detune: 6 },
    { mult: 7,  amp: 0.07, type: 'sine',     detune: -5 },
  ];
  harmonics.forEach(h => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = h.type;
    o.detune.value = h.detune;
    // small upward bend of ~30 cents
    o.frequency.setValueAtTime(freq * h.mult * 0.985, t);
    o.frequency.exponentialRampToValueAtTime(freq * h.mult, t + 0.08);
    g.gain.value = h.amp;
    o.connect(g); g.connect(noteGain);
    o.start(t); o.stop(t + dur + 0.1);
  });

  // tiny shimmer/buzz noise to suggest sympathetic strings
  const buzz = ctx.createBufferSource();
  buzz.buffer = makeNoiseBuffer(ctx, 'white', 0.3);
  const bf = ctx.createBiquadFilter();
  bf.type = 'bandpass';
  bf.frequency.value = freq * 4;
  bf.Q.value = 8;
  const bg = ctx.createGain();
  bg.gain.setValueAtTime(velocity * 0.3, t);
  bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
  buzz.connect(bf); bf.connect(bg); bg.connect(noteGain);
  buzz.start(t); buzz.stop(t + 0.3);
}

function startSitar() {
  const ctx = ensureCtx();
  const sound = { nodes: [], alive: true };
  const master = ctx.createGain();
  master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 1.5);

  const reverb = makeReverb(ctx, 2.5, 3);
  const wet = ctx.createGain(); wet.gain.value = 0.28;
  const dry = ctx.createGain(); dry.gain.value = 0.85;
  master.connect(dry); dry.connect(ctx.destination);
  master.connect(reverb); reverb.connect(wet); wet.connect(ctx.destination);
  sound.master = master;
  sound.nodes.push(master, reverb, wet, dry);

  // tanpura-like drone: Sa (root, octave below) + Pa (fifth) sustained
  const droneFreqs = [
    midiToFreq(SITAR_ROOT - 12),       // low Sa
    midiToFreq(SITAR_ROOT - 12 + 7),   // low Pa
    midiToFreq(SITAR_ROOT),            // Sa
  ];
  droneFreqs.forEach((f, idx) => {
    const o = ctx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = f;
    o.detune.value = (Math.random() - 0.5) * 6;
    const g = ctx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 3 + idx);
    // gentle swell
    const swell = ctx.createOscillator();
    swell.frequency.value = 0.05 + idx * 0.02;
    const swellAmt = ctx.createGain();
    swellAmt.gain.value = 0.025;
    swell.connect(swellAmt); swellAmt.connect(g.gain);
    swell.start();
    o.connect(g); g.connect(master);
    o.start();
    sound.nodes.push(o, g, swell, swellAmt);
  });

  // melodic phrases over the drone
  const playPhrase = () => {
    if (!sound.alive) return;
    const phrase = SITAR_PHRASES[Math.floor(Math.random() * SITAR_PHRASES.length)];
    let t = ctx.currentTime + 0.05;
    phrase.forEach(([offset, beats]) => {
      const freq = midiToFreq(SITAR_ROOT + offset);
      playSitarNote(ctx, master, freq, t, 0.32 + Math.random() * 0.08);
      t += beats * SITAR_BEAT;
    });
    const phraseLen = (t - ctx.currentTime) * 1000;
    const pause = 1500 + Math.random() * 2000;
    setTimeout(playPhrase, phraseLen + pause);
  };
  setTimeout(playPhrase, 1200);

  return sound;
}

const SOUND_CATEGORY = { forest: 'nature', ocean: 'nature', flute: 'instrument', sitar: 'instrument' };

function toggleSound(name) {
  if (activeSounds[name]) { stopOne(name); return; }
  // stop any other sound in the same category
  const cat = SOUND_CATEGORY[name];
  Object.keys(activeSounds).forEach(other => {
    if (SOUND_CATEGORY[other] === cat) stopOne(other);
  });
  let sound = null;
  if (name === 'forest') sound = startForest();
  else if (name === 'ocean') sound = startOcean();
  else if (name === 'flute') sound = startFlute();
  else if (name === 'sitar') sound = startSitar();
  if (sound) {
    activeSounds[name] = sound;
    document.querySelector(`button[data-sound="${name}"]`).classList.add('active');
  }
}

document.querySelectorAll('button[data-sound]').forEach(btn => {
  btn.addEventListener('click', () => toggleSound(btn.dataset.sound));
});

// ===== 5-minute timer =====
const TIMER_DURATION = 5 * 60;
let remaining = TIMER_DURATION;
let timerInterval = null;
const timerEls = [document.getElementById('timer'), document.getElementById('timer-date')];
const timerBtn = document.getElementById('btn-timer');
const pulseEl = document.getElementById('pulse');

function fmt(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r.toString().padStart(2, '0')}`;
}
function renderTimer() { timerEls.forEach(el => el.textContent = fmt(remaining)); }

function startTimer() {
  if (timerInterval) return;
  timerEls.forEach(el => el.classList.add('running'));
  timerBtn.textContent = 'pause';
  timerInterval = setInterval(() => {
    remaining--;
    renderTimer();
    if (remaining <= 0) finishTimer();
  }, 1000);
}
function pauseTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerEls.forEach(el => el.classList.remove('running'));
  timerBtn.textContent = 'start';
}
function resetTimer() {
  pauseTimer();
  remaining = TIMER_DURATION;
  renderTimer();
}
function finishTimer() {
  pauseTimer();
  remaining = TIMER_DURATION;
  renderTimer();
  pulseEl.classList.add('on');
  setTimeout(() => pulseEl.classList.remove('on'), 4000);
  try {
    const ctx = ensureCtx();
    const t = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.15);
      g.gain.linearRampToValueAtTime(0.18, t + i * 0.15 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.15 + 2.5);
      o.connect(g); g.connect(ctx.destination);
      o.start(t + i * 0.15); o.stop(t + i * 0.15 + 2.6);
    });
  } catch(e){}
  flash('time');
}
timerBtn.addEventListener('click', () => { if (timerInterval) pauseTimer(); else startTimer(); });
timerEls.forEach(el => el.addEventListener('click', resetTimer));
renderTimer();

// ===== theme =====
const THEME_KEY = 'calm-theme';
function applyTheme(t) {
  if (t === 'dark') document.body.classList.add('dark');
  else document.body.classList.remove('dark');
}
applyTheme(localStorage.getItem(THEME_KEY) || 'light');
document.getElementById('btn-theme').addEventListener('click', () => {
  const next = document.body.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next);
});

// ===== service worker (offline) =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// only auto-focus on desktop — on mobile this hides the toolbar behind the keyboard
if (window.matchMedia('(min-width: 540px)').matches) {
  bodyEl.focus();
}
